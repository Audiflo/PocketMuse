[platformio]
default_envs = OTA_APP

[common]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
board_upload.flash_size = 16MB
board_build.mcu = esp32s3
board_build.flash_mode = qio

[env:OTA_APP]
extends = common
board_build.partitions = partitions_OTA_APP.csv
build_flags =
    -DOTA_APP_FLAG=1
    -DPOCKETMAGE_HW_VERSION=0
    -DBOARD_HAS_PSRAM=0
    -DMONITOR_SPEED=115200
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DDISABLE_DIAGNOSTIC_OUTPUT
    -DPNG_MAX_BUFFERED_PIXELS=5120
    -std=gnu++17
    -Wno-unused-parameter
    -Iinclude
    -I../PocketMage_V3/include
build_unflags =
    -std=gnu++11
lib_deps =
    adafruit/Adafruit GFX Library @ ^1.11.11
    adafruit/Adafruit TCA8418 @ ^1.0.2
    adafruit/RTClib @ ^2.1.4
    olikraus/U8g2 @ ^2.36.4
    U8g2_for_Adafruit_GFX
    adafruit/Adafruit MPR121 @ ^1.1.2
    gmarty2000/Buzzer @ ^1.0.0
    https://github.com/ashtf8/GxEPD2_Editable_useFastFullUpdate.git
    https://github.com/esp32beans/ESP32_USB_Host_HID.git
    tobozo/ESP32-targz
    https://github.com/esp-arduino-libs/ESP32_USB_Stream.git
    https://github.com/bitbank2/JPEGDEC.git
    https://github.com/bitbank2/PNGdec.git
    https://github.com/pschatzmann/arduino-audio-tools.git
    https://github.com/pschatzmann/arduino-libhelix.git
